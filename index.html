
<!DOCTYPE html>
<html>
<head>
<title>For My Love</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
overflow:hidden;
}

/* LOVE background */
body::before{
content:"LOVE LOVE LOVE LOVE LOVE LOVE LOVE";
position:absolute;
font-size:60px;
color:rgba(255,255,255,0.05);
top:0;
left:0;
width:100%;
height:100%;
display:flex;
flex-wrap:wrap;
justify-content:center;
align-items:center;
z-index:-1;
}

/* couple picture */
img{
width:350px;
border-radius:15px;
box-shadow:0 0 20px pink;
}

/* floating hearts */
.heart{
position:absolute;
color:red;
font-size:25px;
animation: float 5s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>

</head>

<body>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<h1>My Favorite Person ❤️</h1>

<img src="couple.jpg">

<script>

/* click করলে song start */
window.addEventListener("click", function(){
document.getElementById("music").play();
});

/* heart animation */
function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
